name: E2E

# Runs the MCP proxy e2e suite against GitHub's hosted MCP server.
# Deliberately NOT triggered on pull_request: the GitHub App credentials
# (APP_ID / APP_PRIVATE_KEY secrets) must never be exposed to fork PR
# workflows.
#
# Credential: a short-lived GitHub App installation token minted per run
# (verified working against api.githubcopilot.com in the Phase 0 spike,
# issue #22). No long-lived PAT required.
on:
  workflow_dispatch:
  schedule:
    # Daily contract-drift canary: the upstream (api.githubcopilot.com) is an
    # external dependency outside our release control — tool renames or
    # session-semantics changes should page us via a red run, not a user.
    - cron: "17 6 * * *"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/e2e-mcp.sh"
      - ".github/workflows/e2e.yml"

env:
  CARGO_TERM_COLOR: always

# Least privilege: read the repo, write only workflow artifacts (the log).
permissions:
  contents: read
  actions: write

jobs:
  e2e-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Mint GitHub App installation token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: openabdev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build
      - name: e2e — MCP reverse proxy against hosted endpoint
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          # App-backend mode section (ghpool mints its own tokens)
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: ./scripts/e2e-mcp.sh
      - name: Upload ghpool server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ghpool-e2e-log
          path: |
            ghpool-e2e.log
            ghpool-e2e-app.log
          if-no-files-found: ignore
